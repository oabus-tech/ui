# ==============================================================================
# Pipeline Develop
# ==============================================================================
# Trigger: Push na branch develop
# CI completo (typecheck, lint, test, build)
# ==============================================================================
name: 'Pipeline Develop'

on:
  push:
    branches:
      - develop

concurrency:
  group: ci-develop
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Typecheck
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Lint
        run: pnpm lint

  test-unit:
    name: Test (Unit)
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run unit tests
        run: pnpm test

  build:
    name: Build
    needs: [test-unit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build
