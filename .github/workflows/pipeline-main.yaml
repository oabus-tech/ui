# ==============================================================================
# Pipeline Main
# ==============================================================================
# Trigger: Push na branch main
# CI (typecheck, lint, test, build) → Publish (via publish.yml)
# ==============================================================================
name: 'Pipeline Main'

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  typecheck:
    name: Typecheck
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Typecheck
        run: pnpm typecheck

  lint:
    name: Lint
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Lint
        run: pnpm lint

  test-unit:
    name: Test (Unit)
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Run unit tests
        run: pnpm test

  build:
    name: Build
    needs: [test-unit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Build
        run: pnpm build

  publish:
    name: Publish
    needs: [build]
    uses: ./.github/workflows/publish.yml
    secrets: inherit
