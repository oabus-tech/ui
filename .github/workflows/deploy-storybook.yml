# ==============================================================================
# Deploy Storybook
# ==============================================================================
# Trigger: Push na branch main ou execução manual
# Build Storybook → Upload S3 → Invalidar CloudFront
# ==============================================================================
name: Deploy Storybook

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-storybook
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  TF_DIR: terraform/environments/storybook
  STORYBOOK_DOMAIN: ui.oabus.com.br
  STORYBOOK_DIST: storybook-static
  STORYBOOK_URL: https://ui.oabus.com.br

jobs:
  deploy-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    environment:
      name: storybook
      url: https://ui.oabus.com.br
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Validate deploy configuration
        run: |
          test -n "$AWS_ACCOUNT_ID" || {
            echo "Missing GitHub Environment variable: AWS_ACCOUNT_ID"
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/oabus-frontend-deploy-prd
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init
          terraform plan -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "bucket=$(terraform output -raw bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Upload immutable assets
        run: |
          aws s3 sync "$STORYBOOK_DIST" "s3://${{ steps.tf.outputs.bucket }}/" \
            --delete \
            --exclude "*.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload html entrypoints
        run: |
          aws s3 sync "$STORYBOOK_DIST" "s3://${{ steps.tf.outputs.bucket }}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CDN
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"

      - name: Check public DNS
        run: |
          curl --fail --silent --show-error --location \
            --retry 5 \
            --retry-delay 10 \
            "$STORYBOOK_URL" > /dev/null
