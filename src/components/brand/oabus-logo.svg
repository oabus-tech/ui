<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-label="Logo Governo do Maranhão MOB">
  <rect width="400" height="400" fill="#E10613"/>
  <defs>
    <style>
      .font-heavy{font-family: Arial Black, Impact, Montserrat, Arial, sans-serif;font-weight:900;letter-spacing:-2px;}
      .font-top{font-family: Arial, Helvetica, sans-serif;font-weight:900;letter-spacing:5px;}
      .small{font-family: Arial, Helvetica, sans-serif;font-weight:700;letter-spacing:.8px;}
      .outline{paint-order:stroke fill;stroke:#F8F9F1;stroke-linejoin:round;stroke-linecap:round;}
      .shadow{paint-order:stroke fill;stroke:#D9D9D9;stroke-linejoin:round;stroke-linecap:round;}
    </style>
    <path id="star" d="M0,-15 L4.4,-4.8 L15,-4.6 L6.5,1.8 L9.5,12 L0,6.2 L-9.5,12 L-6.5,1.8 L-15,-4.6 L-4.4,-4.8 Z"/>
  </defs>

  <!-- Bloco Governo do Maranhão -->
  <g transform="translate(0,0)">
    <text x="119" y="76" font-size="20" class="font-top shadow" stroke-width="8" fill="#0B0A09">GOVERNO DO</text>
    <text x="119" y="76" font-size="20" class="font-top outline" stroke-width="4" fill="#0B0A09">GOVERNO DO</text>

    <!-- MARA -->
    <g class="font-heavy" font-size="78">
      <text x="97" y="140" class="shadow" stroke-width="12" fill="#BE262D">MA</text>
      <text x="97" y="140" class="outline" stroke-width="6" fill="#BE262D">MA</text>
      <text x="201" y="140" class="shadow" stroke-width="12" fill="#165384">RA</text>
      <text x="201" y="140" class="outline" stroke-width="6" fill="#165384">RA</text>
    </g>
    <use href="#star" x="278" y="116" fill="#F8F9F1"/>

    <!-- NHÃO -->
    <g class="font-heavy" font-size="78">
      <text x="103" y="200" class="shadow" stroke-width="12" fill="#059948">NH</text>
      <text x="103" y="200" class="outline" stroke-width="6" fill="#059948">NH</text>
      <text x="209" y="200" class="shadow" stroke-width="12" fill="#F59F20">ÃO</text>
      <text x="209" y="200" class="outline" stroke-width="6" fill="#F59F20">ÃO</text>
    </g>

    <text x="124" y="223" font-size="10.5" class="small shadow" stroke-width="5" fill="#0B0A09">TRABALHANDO PARA TODOS</text>
    <text x="124" y="223" font-size="10.5" class="small outline" stroke-width="2" fill="#0B0A09">TRABALHANDO PARA TODOS</text>
  </g>

  <line x1="109" y1="257" x2="300" y2="257" stroke="#0B0A09" stroke-width="3"/>

  <!-- MOB -->
  <text x="130" y="333" font-size="62" class="font-heavy shadow" stroke-width="13" fill="#0B0A09">MOB</text>
  <text x="130" y="333" font-size="62" class="font-heavy outline" stroke-width="8" fill="#0B0A09">MOB</text>
</svg>
